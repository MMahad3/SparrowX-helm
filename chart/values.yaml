# ==============================================================================
# POSTGRES RAAST (local postgres for raast simulator)
# ==============================================================================
postgresRaast:
  nameOverride: "postgres-raast"
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    ports:
      - name: postgres
        port: 5432
        targetPort: 5432

  config:
    user: "postgres"
    password: "postgres"
    database: "raast"
    pgdata: "/var/lib/postgresql/data/pgdata"
  persistence:
    enabled: true
    claimName: data-raast
    storageClass: ""  # Empty uses cluster default. Override: gp2 (AWS), gp3-csi (OpenShift), managed-premium (AKS)
    accessMode: ReadWriteOnce
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  nodeSelector: {}

# ==============================================================================
# REDIS RAAST (local redis for raast simulator)
# ==============================================================================
redisRaast:
  nameOverride: "redis-raast"
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    claimName: raast-data
    storageClass: ""  # Empty uses cluster default. Override: gp2 (AWS), gp3-csi (OpenShift), managed-premium (AKS)
    accessMode: ReadWriteOnce
    size: 5Gi
  service:
    type: ClusterIP
    ports:
      - name: redis
        port: 6379
        targetPort: 6379
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  nodeSelector: {}
