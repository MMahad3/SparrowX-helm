  # Global tagging — applied to every resource (team, cost-centre, env, etc.)
  commonLabels: {}
  commonAnnotations: {}

  # Global Node Selector - can be overridden per service
  nodeSelector: {}

  # Scheduling controls
  tolerations: []
  topologySpreadConstraints: []

  # Extensibility hooks — applied to all pods unless overridden per service
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []

  # Global Service Account configuration
  serviceAccount:
    create: true
    automountServiceAccountToken: true
    annotations: {}
    labels: {}

  # Global Pod and Container Security Contexts - applied to all services unless overridden
  # Empty by default for cross-platform compatibility (EKS, AKS, OpenShift).
  # Override per platform as needed. Examples:
  #   EKS/AKS:    podSecurityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
  #   OpenShift:   podSecurityContext: {}  (let OpenShift assign UIDs from namespace range)
  podSecurityContext: {}

  # Global Container Security Context - applied to all containers in all services unless overridden
  # Override per platform as needed. Examples:
  #   EKS/AKS:    containerSecurityContext: { allowPrivilegeEscalation: false, runAsNonRoot: true, runAsUser: 1000, capabilities: { drop: ["ALL"] } }
  #   OpenShift:   containerSecurityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
  containerSecurityContext: {}

# ==============================================================================
# Shared Secrets
# ==============================================================================
secrets:
  dockerRegistry:
    enabled: false
    nameOverride: ""                  # generated: <release>-docker-registry-secret
    dockerConfigJson: ""              # base64-encoded .dockerconfigjson
  vault:
    enabled: true
    nameOverride: ""  # generated: <release>-vault-token-secret
    rootToken: *vaultToken             # Vault root token from platformx-infra
  redis:
    enabled: true
    nameOverride: ""                  # generated: <release>-redis-password-secret
    password: *redisPassword

# ==============================================================================
# Dapr Components
# ==============================================================================
dapr:
  redis:
    pubsub:
      enabled: true
      name: platformx-pubsub

      # redisHost: redis-master.platformx-infra.svc.cluster.local:6379  # rendered via template helper
      redisPassword: *redisPassword
      enableTLS: "false"

      maxRetries: "3"
      maxRetryBackoff: 2s
      redeliverInterval: 60s
      processingTimeout: "30s"

      redisType: node
      redisDB: "0"
      streamTTL: 720h
      autoAck: "false"
      claimInterval: 120s

      # ── Throughput ─────────────────
      queueDepth: "100"
      concurrency: "10"
      maxLenApprox: "100000"

      # ── Dead Letter ────────────────
      deliveryDeadLetterTopic: sparrowx-dead-letter-queue
      deadLetterTTL: 168h
      deadLetterQueueConsumerGroupName: sparrowx-dlq-consumer
      
    state:
      enabled: true
      name: redis-state

  vault:
    secretstore:
      enabled: true
      name: vault-secretstore

  k8s:
    secretstore:
      enabled: true
      name: k8s-secretstore

# ==============================================================================
# DASHBOARD IMPORT JOB
# ==============================================================================
dashboardImportJob:
  enabled: false
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  grafanaImporterImage: "grafana/grafana:latest"
  
  grafana:
    # Grafana URL - auto-constructed from global.obsNamespace if not set
    url: ""  # Default: http://grafana.platformx-observability.svc.cluster.local:3000
    user: "admin"
    password: "admin"
    datasource:
      uid: "prometheus"
      name: "Prometheus"

# ==============================================================================
# BACKOFFICE
# ==============================================================================
backoffice:
  enabled: true
  nameOverride: ""  # generated: <release>-backoffice
  replicas: 1

  # Deployment settings
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 10
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%
  terminationGracePeriodSeconds: 30
  dnsPolicy: ClusterFirst
  schedulerName: default-scheduler
  restartPolicy: Always
  # restartOnConfigChange: replaced by checksum/config annotation in deployment template (idempotent rolling restarts)

  image:
    repository: devopstps/platform-backoffice
    tag: "v0.1.46"
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""
    automountServiceAccountToken: true
    annotations: {}
    labels: {}

  podSecurityContext: {}

  containerSecurityContext: {}
  
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 3000
        targetPort: 3000

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: false
    minAvailable: 1

  nodeSelector: {}

  ingress:
    enabled: false
    healthcheckPath: "/"
    successCodes: "200,301,302"
    hosts:
      - host: "backoffice.tpsonline.com"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: backoffice-tls
        hosts:
          - "backoffice.tpsonline.com"

  route:
    enabled: true
    hosts:
      - host: "backoffice.tpsonline.com"
    tls:
      insecureEdgeTerminationPolicy: "Redirect"
      tlsTermination: "edge"

