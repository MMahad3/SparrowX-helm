# ==============================================================================
# CHANNEL SERVICE
# ==============================================================================
channelService:
  enabled: true
  nameOverride: ""  # generated: <release>-channelservice
  replicas: 1

  image:
    repository: devopstps/platform-service-channel
    tag: "M-0.0.1"
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    name: ""
    automountServiceAccountToken: true
    annotations: {}
    labels: {}

  podSecurityContext: {}

  containerSecurityContext: {}

  service:
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
      - name: https
        port: 8443
        targetPort: 8443
      - name: metrics
        port: 9091
        targetPort: 9091

  dapr:
    enabled: true
    appId: "channelservice"
    appPort: "8080"
    appProtocol: "http"
    httpPort: "3500"
    grpcPort: "50001"
    metricsPort: "9091"
    enableAppHealthCheck: true
    healthCheckPath: "/health"
    healthCheckInterval: "30s"

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  pdb:
    enabled: false
    minAvailable: 1

  nodeSelector: {}

  # Synced from: channelservice-config ConfigMap
  config:
    ASPNETCORE_ENVIRONMENT: Development
    ASPNETCORE_URLS: http://+:8080;https://+:8443
    AuditDaprPubSub__AuditEventsSubscriptionName: audit-trail-service
    AuditDaprPubSub__AuditEventsTopic: audit-events
    AuditDaprPubSub__PubSubComponentName: *daprPubsubName
    Dapr__ConnectionSecretName: channelservice/postgresql-connectionstring
    # PUBSUB_COMPONENT_NAME: *daprPubsubName Not present in given configmaps
    Dapr__GrpcEndpoint: http://localhost:50001
    Dapr__HttpEndpoint: http://localhost:3500
    LoggingConfiguration__LogPath: /tmp/logs
    # DATABASE_HOST: *postgresHost
    # DATABASE_NAME: *postgresDatabase
    # DATABASE_USERNAME: *postgresUser
    # DATABASE_PASSWORD: *postgresPassword
    OTEL_EXPORTER_OTLP_ENDPOINT: *otelGrpcEndpoint
    OTEL_EXPORTER_ZIPKIN_ENDPOINT: *zipkinEndpoint
    OTEL_RESOURCE_ATTRIBUTES: deployment.environment=development,service.instance.id=channelservice-1
    OTEL_SERVICE_NAME: ChannelService
    Observability__EnableMetrics: "true"
    Observability__EnableTracing: "true"
    Observability__OtlpEndpoint: *otelGrpcEndpoint
    Observability__ZipkinEndpoint: *zipkinEndpoint
    # SERVICE_NAME: channelservice
    SSL_ALLOWED_THUMBPRINTS: ""
    SSL_CERT_PASSWORD: development
    SSL_CERT_PATH: ./certs/channelservice.pfx
    SSL_HTTP_PORT: "8080"
