# ==============================================================================
# SparrowX Unified Values
#
# This is the canonical values file for the SparrowX Helm chart.
# Override per-environment values using:  --values values-<env>.yaml
# ==============================================================================

# ==============================================================================
# global.namespace has been removed.
# Use --namespace <ns> on the helm CLI or set the namespace in your release.
# The chart now uses .Release.Namespace for all resource namespaces.
# ==============================================================================
global:
  infraNamespace: "platformx-infra"
  obsNamespace: "platformx-observability"
  imagePullSecrets:
     - docker-registry-secret  # Existing pull secret names (used when secrets.dockerRegistry.enabled=false)
  dockerRegistry: devopstps
  image:
    tag: ""  # REQUIRED: set to a pinned tag (e.g. "v1.2.3"). Using "latest" prevents rollbacks.

  dapr:
    enabled: true
    logLevel: info
    enableMetrics: "true"
    sidecarMemoryLimit: "1000Mi"
    sidecarCpuLimit: "300m"
    sidecarMemoryRequest: "250Mi"
    sidecarCpuRequest: "100m"

  observability:
    zipkinEndpoint: &zipkinEndpoint
      http://zipkin.platformx-observability.svc.cluster.local:9411/api/v2/spans
    otelCollectorGrpcEndpoint: &otelGrpcEndpoint
      http://otel-collector-opentelemetry-collector.platformx-observability.svc.cluster.local:4317
    otelCollectorEndpoint: &otelCollectorEndpoint
      http://otel-collector-opentelemetry-collector.platformx-observability.svc.cluster.local:4318
    grafanaEndPoint: &grafanaEndPoint
      http://grafana.platformx-observability.svc.cluster.local:3000
    grafanaUser: "admin"
    grafanaPassword: "admin"
    enableTracing: "true"
    enableMetrics: "true"

  infrastructure:

    redis:
      host: &redisHost "redis-master.platformx-infra.svc.cluster.local"
      port: &redisPort "6379"
      password: &redisPassword "redis"

    temporal:
      host: &temporalHost "temporal-frontend.platformx-infra.svc.cluster.local"
      port: &temporalPort "7233"
      namespace: &temporalNamespace "default"

    postgres:
      host: &postgresHost "postgresql.platformx-infra.svc.cluster.local"
      port: &postgresPort "5432"
      username: &postgresUser "postgres"
      password: &postgresPassword "postgres"
      database: &postgresDatabase "platformdb"
      schemaNames: &postgresSchemas "channel messagestore audit usermanagement configuration notificationgateway batch cas host lookup errormanagement"

    vault:
      host: &vaultHost "http://vault.platformx-infra.svc.cluster.local"
      port: &vaultPort 8200
      rootToken: &vaultToken "root-token"
      address: &vaultAddress "http://vault.platformx-infra.svc.cluster.local:8200"

  # Shared ALB ingress defaults – all ingress templates inherit these values.
  # Per-service ingress blocks need only set: enabled, healthcheckPath,
  # successCodes (when non-default), hosts, and tls.
  ingress:
    className: alb
    scheme: internet-facing
    targetType: ip
    listenPorts: '[{"HTTPS":443}]'
    sslRedirect: "443"
    backendProtocol: HTTP
    healthcheckPath: "/"
    healthcheckPort: traffic-port
    successCodes: "200"
    healthcheckIntervalSeconds: "15"
    healthcheckTimeoutSeconds: "5"
    healthyThresholdCount: "2"
    unhealthyThresholdCount: "2"

  # ===========================================================================
  # Shared scalar anchors
  # To update a shared value, change it here only.
  # ===========================================================================
  shared:
    # ── Dapr component names ─────────────────────────────────────────────────
    daprPubsubName:  &daprPubsubName  "platformx-pubsub"
    daprStateStore:  &daprStateStore  "redis-state"
    daprSecretStore: &daprSecretStore "vault-secretstore"

    # ── Keycloak ─────────────────────────────────────────────────────────────
    keycloakUrl:    &keycloakUrl    "https://keycloakdev.platformxcloud.com"
    keycloakRealm:  &keycloakRealm  "platformx"
    keycloakIssuer: &keycloakIssuer "https://keycloakdev.platformxcloud.com/realms/platformx"

    # ── Metabase ─────────────────────────────────────────────────────────────
    metabaseInternalUrl: &metabaseInternalUrl "http://metabase.platformx-infra.svc.cluster.local:3000"
    metabasePublicUrl:   &metabasePublicUrl   "https://metabase.tpsonline.com"
    metabaseApiKey:      &metabaseApiKey      "mb_5Xe85x0KFbCYnCtmPAO1dCKL4c9Cac6dgF84EovqxFg="
    metabaseSecretKey:   &metabaseSecretKey   "1b3f707c86b7fe3e2dfcb079ef2dd49897f0a09c62d2da75a283230709625b81"

    # ── Novu ─────────────────────────────────────────────────────────────────
    novuApiUrl: &novuApiUrl "http://novu-api.platformx-infra.svc.cluster.local:3001"
    novuApiKey: &novuApiKey "2da16926d4917d9977118ec1e24335cb"

    # ── Flagsmith ─────────────────────────────────────────────────────────────
    flagsmithEnvKey:   &flagsmithEnvKey   "ser.Q98WZ3Yv9rTFcJfSUbQuTR"
    flagsmithApiUrl:   &flagsmithApiUrl   "http://flagsmith-api.platformx-infra.svc.cluster.local:8000"
    flagsmithApiV1Url: &flagsmithApiV1Url "http://flagsmith-api.platformx-infra.svc.cluster.local:8000/api/v1/"

    # ── Loki ─────────────────────────────────────────────────────────────────
    lokiUrl: &lokiUrl "http://loki.platformx-observability.svc.cluster.local:3100/loki/api/v1/push"

    # ── OTEL collector gRPC host (no http:// — used by OTLP_* endpoint vars) ─
    otelGrpcHostOnly: &otelGrpcHostOnly "otel-collector-opentelemetry-collector.platformx-observability.svc.cluster.local:4317"

    # ── Inter-service address templates (resolved at render time via tpl) ─────
    messageStoreGrpc:     &msgStoreGrpc     "{{ include \"sparrowx.messageStore.name\" . }}.{{ .Release.Namespace }}.svc.cluster.local:8081"
    messageStoreHost:     &msgStoreHost     "{{ include \"sparrowx.messageStore.name\" . }}.{{ .Release.Namespace }}.svc.cluster.local"
    messageTransformGrpc: &msgTransformGrpc "{{ include \"sparrowx.messageTransformation.name\" . }}.{{ .Release.Namespace }}.svc.cluster.local:50053"
    commsIpsGrpc:         &commsIpsGrpcTpl  "{{ include \"sparrowx.raastCommsIps.name\" . }}.{{ .Release.Namespace }}.svc.cluster.local:50051"

    # ── Dapr sidecar localhost addresses ──────────────────────────────────────
    daprHttpSidecar:      &daprHttpSidecar      "http://localhost:3500"
    daprGrpcSidecar:      &daprGrpcSidecar      "http://localhost:50001"

    # ── Common Dapr invoke paths ─────────────────────────────────────────────
    channelServiceDaprUrl: &channelServiceDaprUrl "http://localhost:3500/v1.0/invoke/channelservice/method/api/v1/channels"
    batchServiceDaprUrl:   &batchServiceDaprUrl   "http://localhost:3500/v1.0/invoke/platform-service-batch/method/api/v1"
    hostSindhBankDaprUrl:  &hostSindhBankDaprUrl  "http://localhost:3500/v1.0/invoke/host-service-sindh-bank/method"
    messageStoreDaprUrl:   &messageStoreDaprUrl   "http://localhost:3500/v1.0/invoke/messagestore/method"

    # ── Service app IDs ───────────────────────────────────────────────────────
    platformBatchAppId:  &platformBatchAppId  "platform-service-batch"
    hostSindhBankAppId:  &hostSindhBankAppId  "host-service-sindh-bank"
    msgTransformAppId:   &msgTransformAppId   "messagetransformation"
    auditEventsSub:      &auditEventsSub      "audit-trail-service"
    messageStoreAppId:   &messageStoreAppId   "messagestore"

    # ── Log file path ─────────────────────────────────────────────────────────
    appLogFilePath: &appLogFilePath "/app/logs/application.log"

    # ── Actuator endpoints ───────────────────────────────────────────────────
    managementEndpoints: &managementEndpoints "health,info,metrics,prometheus"

    # ── RAAST comms family shared config ─────────────────────────────────────
    raastCommsHttpEndpoint:    &raastCommsHttpEndpoint    "http://raast-simulator:7001/output"
    raastCommsJavaOpts:        &raastCommsJavaOpts        "-Xms512m -Xmx1024m"
    raastCommsOtelPropagators: &raastCommsOtelPropagators "tracecontext,baggage"
    raastCommsOtelResources:   &raastCommsOtelResources   "service.name=raast-comms,deployment.environment=production"
    p2pSendingQueue:           &p2pSendingQueue           "p2p-sending-queue"
    p2pReceivingQueue:         &p2pReceivingQueue         "p2p-receiving-queue"

    # ── Cross-service shared identifiers ────────────────────────────────────
    raastServiceTokenGrpc: &raastServiceTokenGrpc "raast-service-token"
    raastBatchProjectName: &raastBatchProjectName "raast-batch-workflows"
    platformNetworkName:   &platformNetworkName   "platform-network"
    transactionEventsTopic: &transactionEventsTopic "transaction-events"

    # ── Cross-service template URLs ──────────────────────────────────────────
    raastBackendUrl:          &raastBackendUrl          "http://{{ include \"sparrowx.raastSimulatorBackend.name\" . }}.{{ .Release.Namespace }}.svc.cluster.local:7002"
    notifGatewayInternalUrl:  &notifGatewayInternalUrl  "http://{{ include \"sparrowx.notificationGateway.name\" . }}.{{ .Release.Namespace }}.svc.cluster.local:8080"
    raastRedisHost:           &raastRedisHost            "{{ include \"sparrowx.redisRaast.name\" . }}.{{ .Release.Namespace }}.svc.cluster.local"
    keycloakInternalUrl:      &keycloakInternalUrl      "http://keycloak-dev.platformx-infra.svc.cluster.local:8080"
    keycloakInternalIssuer:   &keycloakInternalIssuer "http://keycloak-dev.platformx-infra.svc.cluster.local:8080/realms/platformx"
    cpmKeycloakIssuer:        &cpmKeycloakIssuer      "https://cpmkeycloakdev.tpsonline.com/realms/master"
    tempoEndpoint:            &tempoEndpoint          "http://tempo.platformx-observability.svc.cluster.local:3200"

    # ── Observability OTEL resource attributes ───────────────────────────────
    otelResourceAttrsDev: &otelResourceAttrsDev "deployment.environment=development,service.version=1.0.0"

